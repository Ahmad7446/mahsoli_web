{% extends "base.html" %}
{% block title %}المشترون{% endblock %}
{% set active_page = 'buyers' %}
{% block page_title %}👥 المشترون{% endblock %}

{% block content %}
<div class="flex-between mb-3" style="flex-wrap:wrap;gap:10px">
  <div class="flex gap-2">
    <button class="btn btn-primary" onclick="openModal('modal-add-buyer')">➕ مشتري جديد</button>
    <button class="btn btn-secondary" onclick="loadBuyers()">🔄 تحديث</button>
  </div>
  <input type="search" placeholder="🔍 بحث..." id="buyer-search"
    oninput="filterBuyers(this.value)"
    style="width:200px;padding:8px 12px">
</div>

<!-- بطاقات المشترين -->
<div id="buyers-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">
  <div class="loading"><div class="spinner"></div></div>
</div>

<!-- Modal: مشتري جديد -->
<div class="modal-overlay" id="modal-add-buyer">
  <div class="modal">
    <div class="modal-title">➕ إضافة مشتري جديد</div>
    <div class="form-group">
      <label class="form-label">👤 الاسم *</label>
      <input type="text" id="b-name" placeholder="اسم المشتري" required>
    </div>
    <div class="form-group">
      <label class="form-label">📱 رقم الهاتف</label>
      <input type="tel" id="b-phone" placeholder="05xxxxxxxx" class="ltr">
    </div>
    <div class="form-group">
      <label class="form-label">📍 العنوان</label>
      <input type="text" id="b-address" placeholder="القرية / المدينة">
    </div>
    <div class="form-group">
      <label class="form-label">🏷️ الفئة</label>
      <select id="b-category">
        <option value="عادي">عادي</option>
        <option value="مميز">مميز ⭐</option>
        <option value="تاجر">تاجر</option>
        <option value="جملة">جملة</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">📝 ملاحظات</label>
      <textarea id="b-notes" rows="2"></textarea>
    </div>
    <div class="flex gap-2 mt-3">
      <button class="btn btn-primary" onclick="addBuyer()" style="flex:1">💾 حفظ</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-add-buyer')" style="flex:1">إلغاء</button>
    </div>
  </div>
</div>

<!-- Modal: تفاصيل مشتري -->
<div class="modal-overlay" id="modal-buyer-detail">
  <div class="modal" style="max-width:560px">
    <div class="modal-title" id="detail-title">👤 تفاصيل المشتري</div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- Modal: إضافة دفعة -->
<div class="modal-overlay" id="modal-payment">
  <div class="modal">
    <div class="modal-title">💵 تسجيل دفعة</div>
    <input type="hidden" id="pay-buyer">
    <div class="form-group">
      <label class="form-label">💵 المبلغ (₪)</label>
      <input type="number" id="pay-amount" step="0.01" min="0" placeholder="0.00">
    </div>
    <div class="form-group">
      <label class="form-label">📅 التاريخ</label>
      <input type="date" id="pay-date">
    </div>
    <div class="form-group">
      <label class="form-label">📝 ملاحظات</label>
      <input type="text" id="pay-notes" placeholder="اختياري">
    </div>
    <div class="flex gap-2 mt-3">
      <button class="btn btn-primary" onclick="submitPayment()" style="flex:1">💾 تسجيل</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-payment')" style="flex:1">إلغاء</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allBuyers = [];

async function loadBuyers() {
  const grid = document.getElementById('buyers-grid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    allBuyers = await api('/api/buyers');
    renderBuyers(allBuyers);
  } catch(e) {
    grid.innerHTML = '<div class="text-danger">خطأ في التحميل</div>';
  }
}

function renderBuyers(buyers) {
  const grid = document.getElementById('buyers-grid');
  if (buyers.length === 0) {
    grid.innerHTML = '<div class="card text-muted" style="text-align:center;padding:30px">لا يوجد مشترون مسجلون</div>';
    return;
  }
  grid.innerHTML = buyers.map(b => {
    const debtColor = b.debt > 0 ? 'var(--danger)' : 'var(--accent)';
    const catBadge = b.category === 'مميز' ? '⭐' : b.category === 'تاجر' ? '🏪' : b.category === 'جملة' ? '📦' : '';
    return `
    <div class="card" style="cursor:pointer" onclick="showBuyerDetail('${b.name}')">
      <div class="flex-between mb-2">
        <div>
          <div style="font-size:16px;font-weight:800">${b.name} ${catBadge}</div>
          <div class="fs-sm text-muted">${b.phone || 'بدون رقم'} ${b.address ? '· ' + b.address : ''}</div>
        </div>
        <div style="text-align:left">
          <div style="font-size:18px;font-weight:900;color:${debtColor}">${fmt(b.debt)}</div>
          <div class="fs-sm text-muted">متبقي</div>
        </div>
      </div>
      <div class="flex gap-2 mt-2" onclick="event.stopPropagation()">
        <button class="btn btn-sm btn-secondary" onclick="showBuyerDetail('${b.name}')">📋 الفاتورة</button>
        <button class="btn btn-sm btn-secondary" onclick="openPaymentModal('${b.name}')">💵 دفعة</button>
        ${b.debt > 0 ? `<button class="btn btn-sm btn-danger" onclick="markAllPaid('${b.name}')">✅ محاسبة</button>` : ''}
        ${b.phone ? `<button class="btn btn-sm btn-secondary" onclick="sendWhatsapp('${b.name}');event.stopPropagation()">💬 واتساب</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function filterBuyers(q) {
  q = q.toLowerCase();
  renderBuyers(allBuyers.filter(b =>
    b.name.toLowerCase().includes(q) ||
    (b.phone||'').includes(q)
  ));
}

async function addBuyer() {
  const name = document.getElementById('b-name').value.trim();
  if (!name) { showToast('يرجى إدخال الاسم', 'error'); return; }
  try {
    await api('/api/buyers', 'POST', {
      name,
      phone: document.getElementById('b-phone').value,
      address: document.getElementById('b-address').value,
      category: document.getElementById('b-category').value,
      notes: document.getElementById('b-notes').value,
    });
    showToast('✅ تم إضافة المشتري');
    closeModal('modal-add-buyer');
    document.getElementById('b-name').value = '';
    document.getElementById('b-phone').value = '';
    document.getElementById('b-address').value = '';
    document.getElementById('b-notes').value = '';
    loadBuyers();
  } catch(e) {
    showToast('خطأ: ' + e.message, 'error');
  }
}

async function showBuyerDetail(name) {
  openModal('modal-buyer-detail');
  document.getElementById('detail-title').textContent = `👤 ${name}`;
  document.getElementById('detail-body').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    // فتح الفاتورة في نافذة جديدة
    window.open(`/api/buyers/${encodeURIComponent(name)}/invoice`, '_blank');
    closeModal('modal-buyer-detail');
  } catch(e) {}
}

async function markAllPaid(name) {
  if (!confirm(`هل تريد تحديد جميع سجلات ${name} كمحاسب؟`)) return;
  try {
    await api(`/api/buyers/${encodeURIComponent(name)}/mark_paid`, 'POST', {});
    showToast(`✅ تم تحديد ${name} كمحاسب`);
    loadBuyers();
  } catch(e) {
    showToast('خطأ', 'error');
  }
}

function openPaymentModal(name) {
  document.getElementById('pay-buyer').value = name;
  document.getElementById('pay-amount').value = '';
  document.getElementById('pay-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('pay-notes').value = '';
  openModal('modal-payment');
}

async function submitPayment() {
  const buyer = document.getElementById('pay-buyer').value;
  const amount = parseFloat(document.getElementById('pay-amount').value);
  if (!amount) { showToast('يرجى إدخال المبلغ', 'error'); return; }
  try {
    await api('/api/payments', 'POST', {
      buyer, amount,
      date: document.getElementById('pay-date').value,
      notes: document.getElementById('pay-notes').value,
    });
    showToast('✅ تم تسجيل الدفعة');
    closeModal('modal-payment');
    loadBuyers();
  } catch(e) {
    showToast('خطأ', 'error');
  }
}

async function sendWhatsapp(name) {
  try {
    const d = await api(`/api/whatsapp/${encodeURIComponent(name)}`);
    window.open(d.url, '_blank');
  } catch(e) {
    showToast('خطأ في فتح واتساب', 'error');
  }
}

loadBuyers();
</script>
{% endblock %}
