services:
  - type: web
    name: mahsoli-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: mahsoli-data
      mountPath: /opt/render/project/src/mahsoli_data
      sizeGB: 1
